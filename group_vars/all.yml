---
# Git source. Use an annotated tag for normal deploys.
# A raw commit SHA also works for emergency/dev deployments.
newserv_repo: "https://github.com/YOUR_ORG_OR_USER/psopeeps-newserv.git"
newserv_ref: "YOUR_NEWSERV_TAG_OR_COMMIT"

# Server-side build source.
newserv_source_dir: "/opt/psopeeps-newserv-src/newserv"
newserv_build_dir: "/opt/psopeeps-newserv-src/newserv/build-ansible"

newserv_build_type: "RelWithDebInfo"
newserv_build_jobs: 4

newserv_cmake_prefix_path: ""
newserv_cmake_cxx_flags: "-Wno-error=mismatched-new-delete"

newserv_built_binary: "{{ newserv_build_dir }}/newserv"
newserv_backup_root: "/opt/newserv-deploy-backups"

newserv_sync_safe_assets: true
newserv_safe_asset_paths:
  - "system/item-tables"

newserv_required_runtime_files:
  - "system/item-tables/ItemMagEdit-dc-v1.prs"
  - "system/item-tables/ItemMagEdit-dc-v2.prs"
  - "system/item-tables/ItemMagEdit-xb-v3.prs"
  - "system/item-tables/ItemMagEdit-bb-v4.prs"

newserv_announce_enabled: false
newserv_announce_required: false
newserv_announce_command: "/usr/local/sbin/newserv-announce-ship"
newserv_announce_pause_seconds: 60
newserv_announce_message: "Maintenance: this ship will restart in 60 seconds for an update. Exit and save now."

newserv_ships:
  dev:
    runtime_dir: "/opt/newserv-dev"
    service: "newserv-dev.service"
    http_url: "http://127.0.0.1:19451/y/lobbies"

  test:
    runtime_dir: "/opt/newserv-test"
    service: "newserv-test.service"
    http_url: "http://127.0.0.1:19351/y/lobbies"

  live:
    runtime_dir: "/opt/newserv-live"
    service: "newserv-live.service"
    http_url: "http://127.0.0.1:19151/y/lobbies"

  vanilla:
    runtime_dir: "/opt/newserv-vanilla"
    service: "newserv-vanilla.service"
    http_url: "http://127.0.0.1:19251/y/lobbies"

  hardcore:
    runtime_dir: "/opt/newserv-hardcore"
    service: "newserv-hardcore.service"
    http_url: "http://127.0.0.1:19551/y/lobbies"

  frontend:
    runtime_dir: "/opt/newserv-src/newserv"
    service: "newserv.service"
    http_url: ""
